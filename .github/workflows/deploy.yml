# Build the Astro site and deploy it to GitHub Pages on every push to main.
name: Deploy to GitHub Pages
 
on:
  push:
    branches: [main]   # deploy whenever you push to main
  workflow_dispatch:    # ...or trigger manually from the Actions tab

permissions:
  contents: read
  pages: write          # allow publishing to Pages
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci          # clean install from package-lock.json
      - name: Build
        run: npm run build    # produces the static dist/ folder
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist        # the built site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4